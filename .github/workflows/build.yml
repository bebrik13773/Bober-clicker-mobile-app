name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Download gradle-wrapper.jar
        run: |
          curl -sL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        timeout-minutes: 15
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.internal.http.connectionTimeout=120000 -Dorg.gradle.internal.http.socketTimeout=120000"
        run: ./gradlew assembleDebug --no-daemon --no-configuration-cache

      - name: Get version info
        id: version
        run: |
          echo "date=$(date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          echo "sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "🦫 Bober Clicker latest (${{ steps.version.outputs.date }})"
          body: |
            Автоматическая сборка из ветки `main`
            Коммит: `${{ github.sha }}`
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
